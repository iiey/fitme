services:
  backend:
    build:
      context: ./backend
    container_name: fitme-backend
    restart: unless-stopped
    environment:
      # Override defaults here if needed (see backend/app/config.py).
      - FITME_DATABASE_URL=sqlite:////app/storage/fitme.db
    volumes:
      # Persists the SQLite database; survives restarts and rebuilds.
      - ./backend/storage:/app/storage
      # Optional: a folder of exports you can import by server path from the UI.
      # Replace ./sample-data with your own export folder (kept read-only).
      - ./sample-data:/data:ro
    ports:
      # Only needed to reach the API/health directly; the frontend talks to the
      # backend over the internal network regardless.
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    container_name: fitme-frontend
    restart: unless-stopped
    environment:
      # The frontend proxies /api/* to this URL (server-side).
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
