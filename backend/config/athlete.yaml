# FitMe athlete configuration.
# These values cannot be derived from the Strava bulk export and are needed for
# training-load (TSS/TRIMP), heart-rate / power zones and weight-relative power.

# Date of birth (YYYY-MM-DD) - used for age-based max-heart-rate fallback.
birthday: "1990-01-01"
# "M" or "F".
sex: "M"
# Body weight in kilograms (for W/kg). Optional.
weight_kg: 72.0

# Functional Threshold Power in watts (cycling). Used for power-based TSS.
ftp: 250

# Heart rate reference values (bpm). If max_heart_rate is null it is estimated
# from age using the Tanaka formula (208 - 0.7 * age).
max_heart_rate: 190
resting_heart_rate: 50

# Preferred unit system: "metric" (km) or "imperial" (mi).
unit_system: "metric"

# Heart-rate zone boundaries as a fraction of max HR (5-zone model).
heart_rate_zones:
  - 0.60
  - 0.70
  - 0.80
  - 0.90

# Threshold pace in seconds per km (e.g. 300 = 5:00/km). Used for pace zones.
threshold_pace: 300

# Pace zone boundaries as fractions of threshold pace (5-zone model).
# Zone 1 (Recovery) is slowest, Zone 5 (Speed) is fastest.
pace_zones:
  - 1.29
  - 1.14
  - 1.06
  - 0.99

# Power zone boundaries as a fraction of FTP (Coggan 7-zone model upper bounds).
power_zones:
  - 0.55
  - 0.75
  - 0.90
  - 1.05
  - 1.20
  - 1.50
